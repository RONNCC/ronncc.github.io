<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Top 30 — World Cup 2026</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0c0c16;--s:#12121f;--s2:#181828;--s3:#1e1e32;
  --bd:#2a2a42;--bd2:#3d3d5c;--tx:#f0f0f7;--soft:#c8c8dc;--mu:#9b9bb8;--mu2:#6e6e8c;
  --gold:#f0c040;--gold2:#d4a82e;--gsoft:rgba(240,192,64,.14);--gline:rgba(240,192,64,.35);
  --blue:#7db4ff;--pink:#ff8ec8;--side:350px;--top:64px;
}
html,body{height:100%}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased}
[x-cloak]{display:none!important}
.top{height:var(--top);border-bottom:1px solid var(--bd);background:rgba(8,8,16,.92);backdrop-filter:blur(14px);display:flex;align-items:center;gap:14px;padding:0 16px;position:relative;z-index:50}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(145deg,#f5d76e,#c9941a);display:grid;place-items:center;font-size:1.15rem;box-shadow:0 0 22px rgba(240,192,64,.28)}
.bt{font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#fff;line-height:1.15}
.bt span{display:block;font-size:.6rem;font-weight:600;color:var(--mu);letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.sw{flex:1;max-width:520px;position:relative}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mu2);pointer-events:none}
.sw input{width:100%;height:40px;border-radius:11px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);padding:0 12px 0 38px;font:inherit;font-size:.88rem;outline:none}
.sw input:focus{border-color:var(--gold2);box-shadow:0 0 0 3px var(--gsoft)}
.sw input::placeholder{color:var(--mu2)}
.stats{display:flex;gap:16px;margin-left:auto}
.stat{text-align:right}.stat b{display:block;font:700 .95rem 'JetBrains Mono',monospace;color:var(--gold)}.stat i{font-style:normal;font-size:.58rem;color:var(--mu);text-transform:uppercase;letter-spacing:.06em}
.mbtn{display:none;width:40px;height:40px;border-radius:11px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:1.15rem;cursor:pointer}
.app{display:grid;grid-template-columns:var(--side) 1fr;height:calc(100vh - var(--top))}
.side{border-right:1px solid var(--bd);background:var(--bg2);display:flex;flex-direction:column;min-height:0}
.filters{padding:10px;border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--bd);background:var(--s2);color:var(--mu);font:700 .68rem Inter,sans-serif;letter-spacing:.03em;padding:5px 10px;border-radius:999px;cursor:pointer}
.chip:hover{color:var(--tx);border-color:var(--bd2)}
.chip.on{background:var(--gsoft);border-color:var(--gline);color:var(--gold)}
.meta{padding:8px 12px;font-size:.7rem;color:var(--mu);border-bottom:1px solid var(--bd)}
.meta b{color:var(--tx)}
.list{flex:1;overflow:auto;padding:8px;scrollbar-width:thin;scrollbar-color:#333355 transparent}
.ti{display:grid;grid-template-columns:40px 28px 1fr auto;gap:10px;align-items:center;padding:10px 11px;border-radius:13px;cursor:pointer;border:1px solid transparent;margin-bottom:3px}
.ti:hover{background:var(--s2);border-color:var(--bd)}
.ti.on{background:linear-gradient(90deg,rgba(240,192,64,.15),rgba(240,192,64,.03));border-color:var(--gline);box-shadow:inset 3px 0 0 var(--gold)}
.ti .rk{font:800 .85rem 'JetBrains Mono',monospace;color:var(--gold);text-align:center;background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.18);border-radius:8px;padding:7px 2px}
.ti .fl{font-size:1.3rem;text-align:center}
.ti .nm{font-weight:700;font-size:.9rem;color:#fff}
.ti .sb{font-size:.66rem;color:var(--mu);margin-top:1px}
.ti .pt{font:500 .66rem 'JetBrains Mono',monospace;color:var(--soft);background:var(--s3);padding:3px 7px;border-radius:7px;border:1px solid var(--bd)}
.main{overflow:auto;min-height:0;background:radial-gradient(ellipse 55% 40% at 85% -5%,rgba(240,192,64,.05),transparent 55%),var(--bg);scrollbar-width:thin;scrollbar-color:#333355 transparent}
.inner{max-width:1000px;margin:0 auto;padding:26px 26px 64px}
.welcome{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 16px}
.welcome h1{font-size:clamp(1.8rem,4vw,2.7rem);font-weight:900;letter-spacing:-.03em;color:#fff}
.welcome h1 em{color:var(--gold);font-style:normal}
.welcome p{color:var(--mu);max-width:480px;margin:10px auto 22px;font-size:.93rem}
.qp{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:640px}
.qp button{border:1px solid var(--bd);background:var(--s2);color:var(--tx);padding:8px 13px;border-radius:999px;font:600 .8rem Inter,sans-serif;cursor:pointer}
.qp button:hover{border-color:var(--gold2);color:#fff}
.hero{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.flagbox{width:72px;height:72px;border-radius:18px;background:var(--s2);border:1px solid var(--bd);display:grid;place-items:center;font-size:2.4rem;flex-shrink:0}
.hero h2{font-size:clamp(1.65rem,3vw,2.25rem);font-weight:900;letter-spacing:-.03em;color:#fff}
.hero .sub{color:var(--mu);font-size:.86rem;margin-top:4px}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--gsoft);border:1px solid var(--gline);color:var(--gold);font:800 .74rem 'JetBrains Mono',monospace;padding:4px 11px;border-radius:999px;margin-bottom:8px}
.tag{display:inline-block;margin-top:9px;background:var(--s2);border:1px solid var(--bd);padding:4px 11px;border-radius:8px;font-size:.76rem;font-weight:600;color:var(--gold)}
.coach{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(125,180,255,.08),rgba(240,192,64,.05));border:1px solid var(--bd);border-radius:16px;padding:14px 16px;margin-bottom:20px}
.cav{width:54px;height:54px;border-radius:14px;overflow:hidden;flex-shrink:0;background:var(--s3);border:1px solid var(--bd2);display:grid;place-items:center;font-weight:900;color:#fff;position:relative}
.cav img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.cav.fail img{display:none}
.coach .cl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--blue)}
.coach .cn{font-weight:800;font-size:1.02rem;color:#fff}
.coach .cm{font-size:.76rem;color:var(--mu);margin-top:2px}
.coach .cnote{margin-left:auto;font-size:.7rem;font-weight:600;color:var(--gold);background:var(--gsoft);border:1px solid var(--gline);padding:5px 10px;border-radius:999px;white-space:nowrap}
.sl{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin:4px 0 12px;display:flex;align-items:center;gap:10px}
.sl::after{content:'';flex:1;height:1px;background:var(--bd)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:11px}
.pc{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:14px;cursor:pointer;text-align:left;color:var(--tx);display:flex;flex-direction:column;gap:10px;min-height:120px;transition:.15s;font:inherit}
.pc:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.pc.on{border-color:var(--gline);box-shadow:0 0 0 1px rgba(240,192,64,.22)}
.pc .top{display:flex;gap:11px;align-items:center;border:0;height:auto;padding:0;background:none;backdrop-filter:none}
.av{width:50px;height:50px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:900;font-size:.95rem;color:#fff;overflow:hidden;position:relative;background:#2a2a40;border:2px solid rgba(255,255,255,.08)}
.av img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.av.fail img{display:none}
.av.fail .fb,.av:not(.has) .fb{visibility:visible}
.av.has .fb{visibility:hidden}
.av.fail.has .fb{visibility:visible}
.pn{font-weight:750;font-size:.95rem;color:#fff}
.pm{font-size:.72rem;color:var(--mu);margin-top:2px;line-height:1.35}
.club{font-size:.72rem;font-weight:600;color:var(--gold);margin-top:auto}
.pd{margin-top:18px;background:var(--s);border:1px solid var(--bd);border-radius:17px;padding:20px}
.pdh{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}
.pdh .av{width:72px;height:72px;font-size:1.25rem}
.pdh h3{font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:-.02em}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px}
.tg{font-size:.68rem;font-weight:600;padding:4px 9px;border-radius:999px;border:1px solid var(--gline);color:var(--gold);background:var(--gsoft)}
.boxes{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.boxes{grid-template-columns:1fr}}
.box{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:14px}
.box .lb{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.box.st .lb{color:var(--blue)}.box.lf .lb{color:var(--pink)}
.box .bd{font-size:.88rem;color:var(--soft);line-height:1.6}
.box.lf .bd{color:var(--mu);font-style:italic}
.credit{margin-top:16px;font-size:.66rem;color:var(--mu2);text-align:center}
.av-1{background:linear-gradient(135deg,#75aadb,#4a8bc2)}.av-2{background:linear-gradient(135deg,#c41e3a,#e63946)}.av-3{background:linear-gradient(135deg,#002395,#1e40af)}.av-4{background:linear-gradient(135deg,#cf142b,#b81c2e)}.av-5{background:linear-gradient(135deg,#900020,#006600)}.av-6{background:linear-gradient(135deg,#009c3b,#006633)}.av-7{background:linear-gradient(135deg,#c1272d,#006633)}.av-8{background:linear-gradient(135deg,#ff6600,#d44a00)}.av-9{background:linear-gradient(135deg,#d4071f,#ffce00)}.av-10{background:linear-gradient(135deg,#111,#dd0000)}.av-11{background:linear-gradient(135deg,#ff0000,#001489)}.av-12{background:linear-gradient(135deg,#009246,#0072ce)}.av-13{background:linear-gradient(135deg,#ffdc00,#003893)}.av-14{background:linear-gradient(135deg,#006847,#ce1126)}.av-15{background:linear-gradient(135deg,#00853f,#c4b800)}.av-16{background:linear-gradient(135deg,#0038a8,#ffcd00)}.av-17{background:linear-gradient(135deg,#002868,#bf0a30)}.av-18{background:linear-gradient(135deg,#bc002d,#002c6c)}.av-19{background:linear-gradient(135deg,#d40000,#888)}.av-20{background:linear-gradient(135deg,#239f40,#da0000)}.av-21{background:linear-gradient(135deg,#c60c30,#888)}.av-22{background:linear-gradient(135deg,#e30a17,#888)}.av-23{background:linear-gradient(135deg,#ffd100,#0033a0)}.av-24{background:linear-gradient(135deg,#ed2939,#888)}.av-25{background:linear-gradient(135deg,#003478,#c60c30)}.av-26{background:linear-gradient(135deg,#008751,#888)}.av-27{background:linear-gradient(135deg,#00008b,#ffcd00)}.av-28{background:linear-gradient(135deg,#006233,#888)}.av-29{background:linear-gradient(135deg,#ce1126,#222)}.av-30{background:linear-gradient(135deg,#ff0000,#888)}
.kbd{font:500 .62rem 'JetBrains Mono',monospace;border:1px solid var(--bd);border-radius:4px;padding:1px 5px;color:var(--mu);background:var(--s2)}
@media(max-width:900px){
  body{overflow:auto}
  .app{grid-template-columns:1fr;height:auto;min-height:calc(100vh - var(--top))}
  .side{position:fixed;inset:var(--top) 0 0 0;z-index:40;transform:translateX(-105%);transition:transform .25s;width:min(360px,92vw);box-shadow:20px 0 40px rgba(0,0,0,.55)}
  .side.open{transform:none}
  .mbtn{display:grid;place-items:center}
  .stats{display:none}
  .inner{padding:16px 14px 72px}
  .bd{position:fixed;inset:var(--top) 0 0 0;background:rgba(0,0,0,.55);z-index:35}
  .coach{flex-wrap:wrap}.coach .cnote{margin-left:0}
}

/* Team overview accordion */
.tov{margin:0 0 18px;background:var(--s);border:1px solid var(--bd);border-radius:16px;overflow:hidden}
.tov-btn{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;background:transparent;border:0;color:var(--tx);cursor:pointer;font:inherit;text-align:left}
.tov-btn:hover{background:rgba(255,255,255,.02)}
.tov-ico{width:36px;height:36px;border-radius:10px;background:var(--s3);border:1px solid var(--bd);display:grid;place-items:center;font-size:1rem;flex-shrink:0}
.tov-title{font-weight:800;font-size:.95rem;color:#fff}
.tov-sub{font-size:.72rem;color:var(--mu);margin-top:2px}
.tov-chev{margin-left:auto;color:var(--mu);transition:transform .2s;font-size:.9rem}
.tov.open .tov-chev{transform:rotate(180deg)}
.tov-body{display:none;padding:0 16px 16px;border-top:1px solid var(--bd)}
.tov.open .tov-body{display:block}
.tov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:14px}
.tov-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px}
.tov-card .k{font-size:.62rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.tov-card .v{font-size:.84rem;color:var(--soft);line-height:1.45}
.tov-card .v strong{color:#fff;font-weight:700}
.tov-wide{grid-column:1/-1}
.tov-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tov-tag{font-size:.68rem;font-weight:600;padding:4px 9px;border-radius:999px;border:1px solid var(--bd);color:var(--soft);background:var(--s3)}
.form-badge{display:inline-flex;align-items:center;gap:8px;margin-top:2px}
.form-shape{font:800 .95rem 'JetBrains Mono',monospace;color:var(--gold);background:var(--gsoft);border:1px solid var(--gline);padding:4px 10px;border-radius:8px}

</style>
</head>
<body x-data="app()" x-cloak @keydown.window="onKey($event)">

<header class="top">
  <button class="mbtn" @click="mobile=!mobile" aria-label="Teams">☰</button>
  <div class="brand">
    <div class="logo">⚽</div>
    <div class="bt">FIFA Top 30<span>World Cup 2026 · Mid-2026 rankings</span></div>
  </div>
  <div class="sw">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
    <input type="search" x-model="q" placeholder="Search teams, players, coaches…" autocomplete="off">
  </div>
  <div class="stats">
    <div class="stat"><b>30</b><i>Teams</i></div>
    <div class="stat"><b>150</b><i>Players</i></div>
    <div class="stat"><b>6</b><i>Confeds</i></div>
  </div>
</header>

<div class="bd" x-show="mobile" @click="mobile=false" x-transition.opacity></div>

<div class="app">
  <aside class="side" :class="{open:mobile}">
    <div class="filters">
      <template x-for="c in confs" :key="c">
        <button type="button" class="chip" :class="{on: conf===c}" @click="conf=c" x-text="c"></button>
      </template>
    </div>
    <div class="meta">Showing <b x-text="filtered.length"></b> teams</div>
    <div class="list">
      <template x-for="t in filtered" :key="t.r">
        <div class="ti" :class="{on: team && team.r===t.r}" @click="select(t)" role="button" tabindex="0" @keydown.enter="select(t)">
          <div class="rk" x-text="'#'+t.r"></div>
          <div class="fl" x-text="t.flag"></div>
          <div>
            <div class="nm" x-text="t.name"></div>
            <div class="sb" x-text="t.conf+' · '+t.players.length+' players'"></div>
          </div>
          <div class="pt" x-text="t.pts" :title="'FIFA ranking points'"></div>
        </div>
      </template>
      <div x-show="!filtered.length" style="padding:36px 14px;text-align:center;color:var(--mu);font-size:.84rem">No matches.</div>
    </div>
  </aside>

  <main class="main">
    <div class="inner">
      <!-- Welcome -->
      <div class="welcome" x-show="!team">
        <div class="logo" style="width:56px;height:56px;font-size:1.6rem;margin-bottom:16px;border-radius:15px">⚽</div>
        <h1>Explore the world's <em>Top 30</em></h1>
        <p>FIFA rankings, head coaches, clubs, play styles & stories for 150 stars. Search anyone — or jump in:</p>
        <div class="qp">
          <template x-for="r in [1,2,3,6,22,29]" :key="r">
            <button type="button" @click="select(byRank(r))" x-text="byRank(r).flag+' '+byRank(r).name"></button>
          </template>
        </div>
        <p style="margin-top:26px;font-size:.74rem;color:var(--mu2)"><span class="kbd">↑</span> <span class="kbd">↓</span> teams · <span class="kbd">1</span>–<span class="kbd">5</span> players · <span class="kbd">/</span> search</p>
      </div>

      <!-- Team detail -->
      <template x-if="team">
        <div>
          <div class="hero">
            <div class="flagbox" x-text="team.flag"></div>
            <div>
              <div class="pill"><span x-text="'#'+team.r"></span> · <span x-text="team.pts+' pts'"></span></div>
              <h2 x-text="team.name"></h2>
              <div class="sub" x-text="team.conf + ' · mid-2026 rankings'"></div>
              <div class="tag" x-text="team.tag"></div>
            </div>
          </div>

          <div class="coach">
            <div class="cav" :class="{fail: coachFail, has: !!team.coach.img}">
              <span x-text="team.coach.initials"></span>
              <img x-show="team.coach.img" :src="team.coach.img" :alt="team.coach.name" loading="lazy" referrerpolicy="no-referrer" @error="coachFail=true">
            </div>
            <div>
              <div class="cl">Head coach</div>
              <div class="cn" x-text="team.coach.name"></div>
              <div class="cm" x-text="team.coach.nation+' · in charge since '+team.coach.since"></div>
            </div>
            <div class="cnote" x-show="team.coach.note" x-text="team.coach.note"></div>
          </div>

          <div class="tov" :class="{open: showOverview}">
            <button type="button" class="tov-btn" @click="showOverview=!showOverview" :aria-expanded="showOverview">
              <div class="tov-ico">📋</div>
              <div>
                <div class="tov-title">Team overview</div>
                <div class="tov-sub" x-text="showOverview ? 'Hide formation, style & identity' : 'Formation, motto, attack style & more'"></div>
              </div>
              <div class="tov-chev">▼</div>
            </button>
            <div class="tov-body" x-show="showOverview" x-cloak>
              <div class="tov-grid">
                <div class="tov-card">
                  <div class="k">Nickname</div>
                  <div class="v" x-text="team.profile.nickname"></div>
                </div>
                <div class="tov-card">
                  <div class="k">Motto / chant cue</div>
                  <div class="v" x-text="team.profile.motto"></div>
                </div>
                <div class="tov-card">
                  <div class="k">Crowd cheer</div>
                  <div class="v" x-text="team.profile.cheer"></div>
                </div>
                <div class="tov-card">
                  <div class="k">Tempo</div>
                  <div class="v" x-text="team.profile.tempo"></div>
                </div>
                <div class="tov-card tov-wide">
                  <div class="k">Usual formation</div>
                  <div class="v">
                    <div class="form-badge">
                      <span class="form-shape" x-text="team.profile.formation"></span>
                      <strong x-text="team.profile.formName"></strong>
                    </div>
                  </div>
                </div>
                <div class="tov-card tov-wide">
                  <div class="k">Attacking style</div>
                  <div class="v" x-text="team.profile.attack"></div>
                </div>
                <div class="tov-card tov-wide">
                  <div class="k">Defensive approach</div>
                  <div class="v" x-text="team.profile.defence"></div>
                </div>
                <div class="tov-card">
                  <div class="k">Strengths</div>
                  <div class="v" x-text="team.profile.strengths"></div>
                </div>
                <div class="tov-card">
                  <div class="k">Watch-outs</div>
                  <div class="v" x-text="team.profile.weaknesses"></div>
                </div>
                <div class="tov-card tov-wide">
                  <div class="k">Team identity</div>
                  <div class="v" x-text="team.profile.identity"></div>
                </div>
              </div>
              <div class="tov-tags">
                <span class="tov-tag" x-text="team.profile.formation"></span>
                <span class="tov-tag" x-text="team.profile.tempo"></span>
                <span class="tov-tag" x-text="team.conf"></span>
              </div>
            </div>
          </div>

          <div class="sl" x-text="'Featured squad · '+team.players.length+' players'"></div>
          <div class="pg">
            <template x-for="(p,i) in team.players" :key="p.name">
              <button type="button" class="pc" :class="{on: pi===i}" @click="pi=i">

function app(){
  return {
    teams: TEAMS,
    confs: ['All','UEFA','CONMEBOL','CAF','CONCACAF','AFC'],
    conf: 'All',
    q: '',
    team: null,
    pi: 0,
    mobile: false,
    fails: {},
    coachFail: false,
    showOverview: false,
    get filtered(){
      const q=this.q.trim().toLowerCase();
      return this.teams.filter(t=>{
        if(this.conf!=='All' && t.conf!==this.conf) return false;
        if(!q) return true;
        if(t.name.toLowerCase().includes(q)||t.conf.toLowerCase().includes(q)||t.tag.toLowerCase().includes(q)) return true;
        if(t.coach&&t.coach.name.toLowerCase().includes(q)) return true;
        return t.players.some(p=>p.name.toLowerCase().includes(q)||p.club.toLowerCase().includes(q)||p.meta.toLowerCase().includes(q));
      });
    },
    get player(){ return this.team ? this.team.players[this.pi] : null; },
    byRank(r){ return this.teams.find(t=>t.r===r); },
    select(t){
      this.team=t; this.pi=0; this.coachFail=false; this.showOverview=false; this.mobile=false;
      history.replaceState(null,'','#'+t.r);
      queueMicrotask(()=>document.querySelector('.main')?.scrollTo({top:0}));
    },
    onKey(e){
      const tag=(e.target.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea'){
        if(e.key==='Escape') e.target.blur();
        if(e.key==='Enter' && this.filtered[0]) this.select(this.filtered[0]);
        return;
      }
      if(e.key==='/' ){ e.preventDefault(); document.querySelector('.sw input')?.focus(); return; }
      if(e.key==='ArrowDown'||e.key==='ArrowUp'){
        e.preventDefault();
        const list=this.filtered;
        if(!list.length) return;
        if(!this.team){ this.select(list[0]); return; }
        let i=list.findIndex(t=>t.r===this.team.r);
        if(i<0) i=0;
        i = e.key==='ArrowDown' ? Math.min(list.length-1,i+1) : Math.max(0,i-1);
        this.select(list[i]);
      }
      if(this.team && e.key>='1' && e.key<='5'){
        const n=+e.key-1;
        if(n<this.team.players.length) this.pi=n;
      }
    },
    init(){
      const h=(location.hash||'').replace('#','');
      if(/^\d+$/.test(h)){
        const t=this.byRank(+h);
        if(t) this.select(t);
      }
      window.addEventListener('hashchange',()=>{
        const h=(location.hash||'').replace('#','');
        if(/^\d+$/.test(h)){ const t=this.byRank(+h); if(t) this.select(t); }
      });
    }
  }
}
